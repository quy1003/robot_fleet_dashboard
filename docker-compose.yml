version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: robot-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:latest
    container_name: robot-redis-pubsub
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: robot-backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - MONGO_URI=mongodb://mongodb:27017/robot-fleet
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped

  simulator:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: robot-simulator
    command: npm run simulator
    environment:
      - WS_URL=ws://backend:8080
    depends_on:
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: robot-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080/api/v1
      - NEXT_PUBLIC_WS_URL=ws://localhost:8080/ws/dashboard
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongodb_data:
